<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DudiDesk</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="/DUDIDESK/assets/index-CNJ8WoYU.js"></script>
  <link rel="stylesheet" crossorigin href="/DUDIDESK/assets/index-g-OoRj0-.css">
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="topbar">
    <div class="settings-wrap">
      <button class="settings-btn" id="settingsBtn">
        <svg class="gear-icon" viewBox="0 0 12 12" fill="currentColor">
          <rect x="4" y="0" width="4" height="2"/><rect x="4" y="10" width="4" height="2"/>
          <rect x="0" y="4" width="2" height="4"/><rect x="10" y="4" width="2" height="4"/>
          <rect x="2" y="2" width="2" height="2"/><rect x="8" y="2" width="2" height="2"/>
          <rect x="2" y="8" width="2" height="2"/><rect x="8" y="8" width="2" height="2"/>
          <rect x="3" y="3" width="6" height="6"/><rect x="4" y="4" width="4" height="4" fill="var(--bg)"/>
        </svg>
        SETTINGS
      </button>
      <div class="settings-dropdown" id="settingsDropdown">
        <div class="dd-section">
          <div class="dd-label">MODE</div>
          <div class="toggle-row" id="modeRow">
            <button class="tog-btn" data-mode="dark">DARK</button>
            <button class="tog-btn active" data-mode="mid">MID</button>
            <button class="tog-btn" data-mode="light">LIGHT</button>
          </div>
        </div>
        <div class="dd-section">
          <div class="dd-label">ICON SIZE</div>
          <div class="toggle-row" id="sizeRow">
            <button class="tog-btn" data-size="s">S</button>
            <button class="tog-btn active" data-size="m">M</button>
            <button class="tog-btn" data-size="l">L</button>
            <button class="tog-btn" data-size="xl">XL</button>
          </div>
        </div>
        <div class="dd-section">
          <div class="dd-label">BACKGROUND</div>
          <div class="toggle-row" id="bgRow">
            <button class="tog-btn active" data-bg="grid">GRID</button>
            <button class="tog-btn" data-bg="dots">DOTS</button>
            <button class="tog-btn" data-bg="plus">PLUS</button>
            <button class="tog-btn" data-bg="aliens">ALIENS</button>
          </div>
        </div>
        <div class="dd-section">
          <div class="dd-label">PANEL OPACITY</div>
          <div class="slider-row">
            <input type="range" id="opacitySlider" min="0" max="10" step="1" value="4" />
            <span id="opacityVal">4</span>
          </div>
        </div>
        <div class="dd-section">
          <div class="dd-label">TITLE</div>
          <div class="title-row">
            <input id="titleInput" type="text" maxlength="12" placeholder="DUDI" />
            <span class="title-suffix">DESK</span>
          </div>
        </div>
        <div class="dd-section">
          <div class="dd-actions"><button class="btn-save" id="btnSave">[ SAVE ]</button></div>
        </div>
      </div>
    </div>
    <span class="clock-time" id="clockTime"></span>
    <div class="topbar-right">
      <span class="clock-date" id="clockDate"></span>
      <a class="weather-widget" id="weatherWidget" href="https://www.google.com/search?q=weather" target="_blank"></a>
      <div class="quicklinks">
        <a class="quicklink" href="https://outlook.live.com" target="_blank">OUTLOOK</a>
        <a class="quicklink" href="https://mail.google.com" target="_blank">GMAIL</a>
        <a class="quicklink" href="https://drive.google.com" target="_blank">G·DRIVE</a>
      </div>
    </div>
  </div>

  <div class="wordmark" id="wordmark">
    <span class="ma" id="wordmarkPrefix">MA</span><span id="wordmarkTitle">DUDI</span><span class="dim">DESK</span>
  </div>

  <form class="search-panel" action="https://www.google.com/search" method="get">
    <span class="search-label">SEARCH</span>
    <input type="text" name="q" placeholder="type here..." autofocus autocomplete="off" />
    <button type="submit" class="search-btn">[ GO ]</button>
  </form>

  <div class="icon-panel-wrap">
    <div class="tab-bar" id="tabBar"></div>
    <div class="icon-panel">
      <div class="icon-grid" id="iconPanel"></div>
    </div>
    <button class="add-panel-btn" id="globalAddBtn">
      <div class="icon-wrap">+</div>
      <span class="sc-label">NEW</span>
    </button>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">// NEW SHORTCUT</div>
      <input type="text" id="inputName" placeholder="NAME" />
      <input type="text" id="inputUrl" placeholder="URL" />
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancel">CANCEL</button>
        <button class="btn-add" id="btnAdd">[ ADD ]</button>
      </div>
    </div>
  </div>

  <div class="folder-overlay" id="folderOverlay">
    <div class="folder-panel">
      <div class="folder-name-row">
        <input class="folder-name-input" id="folderNameInput" placeholder="FOLDER NAME" maxlength="16" />
        <button class="folder-close-btn" id="folderCloseBtn">[ CLOSE ]</button>
      </div>
      <div class="folder-color-row">
        <span class="color-label">COLOR</span>
        <div id="folderColorPicker"></div>
      </div>
      <div class="folder-grid" id="folderGrid"></div>
    </div>
  </div>

  <!-- Bottom-right dock: TODO + NOTES -->
  <div class="bw-dock">
    <div class="bw-item">
      <div class="bw-panel" id="todoPanel">
        <div class="bw-panel-header">// TO DO</div>
        <div class="todo-list" id="todoList"></div>
        <div class="todo-add-row">
          <input type="text" id="todoInput" placeholder="NEW TASK..." maxlength="60" autocomplete="off" />
          <button id="todoAddBtn">[ + ]</button>
        </div>
      </div>
      <button class="bw-btn" id="todoBtn">TO DO!</button>
    </div>
    <div class="bw-item">
      <div class="bw-panel notes-panel" id="notesPanel">
        <div class="notes-tabs-bar" id="notesTabsBar"></div>
        <textarea class="notes-textarea" id="notesTextarea" placeholder="..."></textarea>
      </div>
      <button class="bw-btn" id="notesBtn">NOTES</button>
    </div>
  </div>

  <div id="dragGhost"></div>

</body>
</html>
